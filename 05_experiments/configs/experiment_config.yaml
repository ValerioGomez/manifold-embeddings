# Experiment Configuration
# Manifold Embeddings Project - UNMSM

general:
  random_seed: 42
  n_components: 2
  verbose: true
  save_embeddings: true
  output_dir: "../results/"

datasets:
  swiss_roll:
    type: synthetic
    n_samples: 1500
    noise: 0.05
  
  # Choose one real dataset:
  wine:
    type: real
    source: sklearn
  
  # Alternative real datasets (uncomment one):
  # mnist_subset:
  #   type: real
  #   source: sklearn
  #   n_samples: 1000
  #   digits: [0, 1, 2, 3, 4, 5]
  # breast_cancer:
  #   type: real
  #   source: sklearn

methods:
  isomap:
    n_components: 2
    k_values: [3, 5, 7, 10, 15, 20, 25, 30, 40, 50]
  
  lle:
    n_components: 2
    method: standard
    k_values: [3, 5, 7, 10, 15, 20, 25, 30, 40, 50]

metrics:
  trustworthiness:
    n_neighbors: 5
  continuity:
    n_neighbors: 5
  classification:
    classifiers: [knn, svm]
    cv_folds: 5
  silhouette: true
  stress: true
  residual_variance: true
  execution_time: true

visualization:
  figsize: [12, 8]
  dpi: 150
  colormap: "tab10"
  save_format: "png"
